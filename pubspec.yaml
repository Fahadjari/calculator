name: flutter_calculator
description: A production-ready Flutter calculator app with modern UI and smooth animations.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Haptic feedback
  vibration: ^1.9.0
  # Google Fonts for premium typography
  google_fonts: ^6.2.1
  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
